name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Detect preview release
        id: flags
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" == *"-preview" ]]; then
            echo "is_preview=true" >> $GITHUB_OUTPUT
          else
            echo "is_preview=false" >> $GITHUB_OUTPUT
          fi

      - name: Build extension ZIP
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          zip -r "ai-chat-exporter-${VERSION}.zip" . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "screenshots/*" \
            --exclude "README*" \
            --exclude "CLAUDE.md" \
            --exclude "NOTICE" \
            --exclude "LICENSE.md" \
            --exclude "VERSION" \
            --exclude "privacy-policy.html" \
            --exclude "*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          prerelease: ${{ steps.flags.outputs.is_preview }}
          generate_release_notes: true
          files: ai-chat-exporter-${{ steps.version.outputs.version }}.zip

      - name: Upload to Chrome Web Store
        if: steps.flags.outputs.is_preview == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          # 1 — Obtain a short-lived access token via the refresh token
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CWS_CLIENT_ID}" \
            -d "client_secret=${CWS_CLIENT_SECRET}" \
            -d "refresh_token=${CWS_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token" \
            | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain access token" >&2
            exit 1
          fi

          # 2 — Upload the new ZIP (replaces the existing draft)
          UPLOAD_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T "ai-chat-exporter-${VERSION}.zip" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}")

          echo "Upload response: $UPLOAD_RESPONSE"

          UPLOAD_STATE=$(echo "$UPLOAD_RESPONSE" | jq -r '.uploadState // .error.message // "UNKNOWN"')
          if [ "$UPLOAD_STATE" != "SUCCESS" ]; then
            echo "Upload failed with state: $UPLOAD_STATE" >&2
            exit 1
          fi

          # 3 — Publish to all users
          PUBLISH_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}/publish")

          echo "Publish response: $PUBLISH_RESPONSE"

          PUBLISH_STATUS=$(echo "$PUBLISH_RESPONSE" | jq -r '.status[0] // .error.message // "UNKNOWN"')
          echo "Publish status: $PUBLISH_STATUS"
          if [ "$PUBLISH_STATUS" = "ITEM_PENDING_REVIEW" ] || [ "$PUBLISH_STATUS" = "OK" ]; then
            echo "Successfully submitted for review."
          else
            echo "Publish may have failed — check the response above." >&2
            exit 1
          fi
