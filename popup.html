<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Exporter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>AI Chat Exporter</span>
      </div>
      <div class="header-right">
        <div class="version">v1.7.0</div>
        <button class="settings-btn" id="settingsBtn" data-i18n-title="settings" title="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="status" class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText" data-i18n="checkingConnection">Checking connection…</span>
    </div>

    <div id="chatInfo" class="chat-info hidden">
      <div class="chat-title" id="chatTitle">—</div>
      <div class="chat-meta" id="chatMeta">—</div>
    </div>

    <div id="exportSection" class="export-section hidden">
      <div class="section-label" data-i18n="exportFormat">Export Format</div>
      <div class="format-grid">
        <button class="format-btn" data-format="markdown">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16v16H4z"/><path d="M7 15V9l3 3 3-3v6"/><path d="M17 12l-2-2v4"/>
          </svg>
          <span>Markdown</span>
        </button>
        <button class="format-btn active" data-format="html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
          <span>HTML</span>
        </button>
        <button class="format-btn" data-format="pdf">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <text x="8" y="18" font-size="7" fill="currentColor" stroke="none" font-weight="bold">PDF</text>
          </svg>
          <span>PDF</span>
        </button>
        <button class="format-btn" data-format="zip">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/><line x1="9" y1="6" x2="15" y2="6"/>
          </svg>
          <span>ZIP</span>
        </button>
      </div>

      <div class="options">
        <div class="section-label" data-i18n="options">Options</div>
        <label class="option-row">
          <input type="checkbox" id="optArtifacts" checked>
          <span data-i18n="includeArtifacts">Include artifacts &amp; canvas</span>
        </label>
        <label class="option-row">
          <input type="checkbox" id="optImages" checked>
          <span data-i18n="embedImages">Embed images as Base64</span>
        </label>
        <label class="option-row">
          <input type="checkbox" id="optThinking" checked>
          <span data-i18n="includeThinking">Include thinking blocks</span>
        </label>
        <label class="option-row">
          <input type="checkbox" id="optToolUse">
          <span data-i18n="includeToolCalls">Include tool calls / results</span>
        </label>
        <label class="option-row">
          <input type="checkbox" id="optFiles" checked>
          <span data-i18n="includeFiles">Include generated files</span>
        </label>
      </div>

      <button id="exportBtn" class="export-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span data-i18n="exportChat">Export Chat</span>
      </button>
      <button id="previewBtn" class="export-btn secondary-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <polyline points="9 9 9 15"/><polyline points="15 9 15 15"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
        </svg>
        <span data-i18n="previewAndSelect">Preview &amp; Select</span>
      </button>
    </div>

    <div id="progress" class="progress hidden">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>

    <div id="logSection" class="log-section hidden">
      <div class="section-label clickable" id="logToggle">
        <span data-i18n="debugLog">Debug Log</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div id="logContent" class="log-content hidden"></div>
    </div>

    <div id="platformList" class="platform-list hidden">
      <div class="section-label" data-i18n="supportedPlatforms">Supported Platforms</div>
      <button class="platform-row" data-url="https://claude.ai/new">
        <span class="platform-icon">🔶</span>
        <span class="platform-name">Claude</span>
        <span class="platform-host">claude.ai</span>
        <svg class="platform-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="platform-row" data-url="https://chatgpt.com/">
        <span class="platform-icon">🟢</span>
        <span class="platform-name">ChatGPT</span>
        <span class="platform-host">chatgpt.com</span>
        <svg class="platform-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="platform-row" data-url="https://gemini.google.com/">
        <span class="platform-icon">🔵</span>
        <span class="platform-name">Gemini</span>
        <span class="platform-host">gemini.google.com</span>
        <svg class="platform-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="platform-row" data-url="https://copilot.microsoft.com/">
        <span class="platform-icon">🪟</span>
        <span class="platform-name">Copilot</span>
        <span class="platform-host">copilot.microsoft.com</span>
        <svg class="platform-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="platform-row" data-url="https://m365.cloud.microsoft/chat">
        <span class="platform-icon">🪟</span>
        <span class="platform-name">Copilot M365</span>
        <span class="platform-host">m365.cloud.microsoft</span>
        <svg class="platform-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div id="error" class="error hidden">
      <div class="error-icon">⚠️</div>
      <div class="error-text" id="errorText"></div>
    </div>
  </div>

  <!-- Shared libraries and modules loaded in dependency order -->
  <script src="jszip.min.js"></script>
  <script src="shared/utils.js"></script>
  <script src="shared/widget-css.js"></script>
  <script src="shared/html-template.js"></script>
  <script src="shared/exporters/markdown.js"></script>
  <script src="shared/exporters/html.js"></script>
  <script src="shared/exporters/zip.js"></script>
  <script src="shared/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
